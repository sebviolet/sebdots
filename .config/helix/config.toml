# theme = "onelight"
# theme = "solarized_light"
# theme = "github_light"
# theme = "onedark"
theme = "github_dark"
# theme = "adwaita-dark"
# theme = "papercolor-dark"
# theme = "papercolor-light"

[editor]
line-number = "relative"
auto-save = true
auto-format = false
end-of-line-diagnostics = "hint"
auto-pairs = false
true-color = true

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
# display-inlay-hints = true

[editor.file-picker]
hidden = true

[editor.whitespace.render]
tab = "all"
nbsp = "all"
